<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Code</title>
</head>
<body style="color: aliceblue; background-color: black;">
    <h1>Muwahid Cheema</h1>
    <button>Stop</button>
</body>
<script>
    // setTimeout(() => {
    //     console.log("Muwahid Cheema");
        
    // } , 2000)

    const changeText = () => {
        document.querySelector('h1').innerHTML = "Tufail Cheema"

    } 
    const timeOut = setTimeout(changeText,2000)
    
    document.querySelector('button').addEventListener('click', () => {
        clearTimeout(timeOut)
        console.log("Stopped");
        
    })
</script>
</html>
